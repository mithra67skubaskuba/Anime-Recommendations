<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>

<style>

/* VIDEO BACKGROUND */
#myVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* BODY */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}



/* BOX */
.signup-box {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    text-align: center;
    width: 300px;
}

/* TITLE */
.signup-box h1 {
    color: white;
    margin-bottom: 20px;
}

/* INPUTS */
.signup-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    outline: none;
}

/* BUTTON */
.signup-box button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #4da6ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.signup-box button:hover {
    background: #1a8cff;
}

/* LINK */
.signup-box p {
    color: white;
    margin-top: 15px;
}

.signup-box a {
    color: #4da6ff;
    text-decoration: none;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop id="myVideo">
  <source src="vid.mp4" type="video/mp4">
</video>

<div class="signup-box">
    <h1>Sign Up</h1>

    <input type="text" placeholder="Username">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <input type="password" placeholder="Confirm Password">

    <button>Create Account</button>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

</body>
</html>
