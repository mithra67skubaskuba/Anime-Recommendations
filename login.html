<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

/* VIDEO BACKGROUND */
#myVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* BODY */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN BOX */
.login-box {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    text-align: center;
    width: 300px;
}

/* TITLE */
.login-box h1 {
    color: white;
    margin-bottom: 20px;
}

/* INPUTS */
.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    outline: none;
}

/* BUTTON */
.login-box button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #4da6ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.login-box button:hover {
    background: #1a8cff;
}

/* LINK */
.login-box p {
    color: white;
    margin-top: 15px;
}

.login-box a {
    color: #4da6ff;
    text-decoration: none;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop id="myVideo">
  <source src="vid.mp4" type="video/mp4">
</video>

<div class="login-box">
    <h1>Login</h1>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // SIMPLE CHECK (demo only)
    if (user === "admin" && pass === "1234") {
        window.location.href = "home.html"; // success page
    } else {
        window.location.href = "signup.html"; // not registered
    }
}
</script>

</body>
</html>
