<script>
function addAnime() {
    let input = document.getElementById("animeInput");
    let value = input.value;

    if (value === "") return;

    let label = document.createElement("label");
    label.className = "new-item";

    label.innerHTML = `
        <input type="checkbox"> ${value}
        <button class="deleteBtn" onclick="this.parentElement.remove()">X</button>
    `;

    document.getElementById("checklist").appendChild(label);

    input.value = "";
}
</script>
